# DO NOT edit this file by hand, qutebrowser will overwrite it.
# Instead, create a config.py - see :help for details.

config_version: 2
settings:
  content.pdfjs:
    global: true
  downloads.location.directory:
    global: '~'
  fonts.monospace:
    global: '"Hack", "xos4 Terminus", Terminus, Monospace, "DejaVu Sans Mono", Monaco,
      "Bitstream Vera Sans Mono", "Andale Mono", "Courier New", Courier, "Liberation
      Mono", monospace, Fixed, Consolas, Terminal'
  url.default_page:
    global: https://www.google.com/
  url.searchengines:
    global:
      DEFAULT: https://www.google.com/search?q={}
      wa: https://wiki.archlinux.org/?search={}
      wg: https://wiki.gentoo.org/?search={}
  url.start_pages:
    global: https://www.google.com/
