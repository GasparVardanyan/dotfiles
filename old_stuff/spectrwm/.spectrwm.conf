border_width = 3
color_focus_maximized = red
bar_action = ~/.local/share/statusbar
bar_format = +A+4<+V
bar_justify = right
bar_border_width = 0
bar_font = DejaVu Sans Mono for Powerline
disable_border = 1
dialog_ratio = 0.6
program[lock] = i3lock -d -c 000000 -f
